version: '3.8'

services:
  hockey-stats:
    image: python:3.12-slim
    container_name: hockey-stats
    restart: unless-stopped
    ports:
      - "1000:8501"
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "pip install -r requirements.txt && streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
    env_file:
      - .env
