version: "3.8"

services:
  homepage:
    build: ./homepage
    container_name: homepage
    restart: unless-stopped
    ports:
      - "80:80"

  hockey-stats:
    build: ./hockey-stats
    container_name: hockey-stats
    restart: unless-stopped
    ports:
      - "1000:8501"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}