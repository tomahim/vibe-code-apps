<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genious Server</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #0f172a; 
            color: #e2e8f0; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 40px 20px; 
        }
        h1 { 
            font-size: 2.5rem; 
            margin-bottom: 30px; 
            color: #fff; 
            text-align: center; 
        }
        h2 { 
            font-size: 1.2rem; 
            margin: 30px 0 15px; 
            color: #94a3b8; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            font-weight: 500;
        }
        input { 
            width: 100%; 
            padding: 14px 20px; 
            margin-bottom: 30px; 
            font-size: 16px; 
            border: 1px solid #334155; 
            border-radius: 12px; 
            background: #1e293b; 
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #3b82f6; }
        input::placeholder { color: #64748b; }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            color: #e2e8f0;
            font-size: 1.2rem;
        }
        body.light {
            background: #f1f5f9;
            color: #1e293b;
        }
        body.light h2 { color: #64748b; }
        body.light h1 { color: #0f172a; }
        body.light input { 
            background: #fff; 
            border-color: #cbd5e1; 
            color: #1e293b;
        }
        body.light input::placeholder { color: #94a3b8; }
        body.light li { background: #fff; }
        body.light li:hover { background: #f8fafc; }
        body.light a { color: #1e293b; }
        body.light .theme-toggle { background: #fff; border-color: #cbd5e1; }
        ul { 
            list-style: none; 
            padding: 0; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 16px; 
        }
        li { 
            background: #1e293b; 
            border-radius: 12px; 
            padding: 20px; 
            transition: transform 0.2s, background 0.2s;
        }
        li:hover { 
            transform: translateY(-2px); 
            background: #334155; 
        }
        a { 
            color: #fff; 
            text-decoration: none; 
            font-size: 1.1rem; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        a:hover { text-decoration: none; }
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .tab {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 20px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .tab.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #fff;
        }
        .tab:hover:not(.active) { background: #334155; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        body.light .tab { background: #fff; border-color: #cbd5e1; color: #64748b; }
        body.light .tab.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
        body.light .tab:hover:not(.active) { background: #f1f5f9; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    <h1>Genious Server</h1>
    <input type="text" id="search" placeholder="Search apps..." onkeyup="filterApps()">

    <div class="tabs">
        <button class="tab active" onclick="switchTab('apps')">Apps</button>
        <button class="tab" onclick="switchTab('serverTools')">Server Tools</button>
    </div>

    <div id="apps" class="tab-content active">
        <ul>
        <li data-name="hockey-stats"><a href="http://10.0.0.1:1000">🏒 hockey-stats</a></li>
    </ul>
    </div>

    <div id="serverTools" class="tab-content">
        <ul>
            <li data-name="ollama"><a href="http://10.0.0.1:3001">🤖 ollama</a></li>
            <li data-name="portainer"><a href="https://10.0.0.1:9443">📦 portainer</a></li>
        <li data-name="opencode"><a href="http://10.0.0.1:4096">💻 opencode</a></li>
        <li data-name="n8n"><a href="http://10.0.0.1:5678">🔄 n8n</a></li>
            <li data-name="code-server"><a href="http://10.0.0.1:8443">🖥️ code-server</a></li>
        </ul>
    </div>
    <div style="margin-top: 40px; text-align: center;">
        <button onclick="redeploy()" style="background:#3b82f6;border:none;border-radius:8px;padding:12px 24px;color:#fff;font-size:1rem;cursor:pointer;">🔄 Redeploy</button>
    </div>
    <script>
        function filterApps() {
            const input = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('#apps li, #serverTools li').forEach(item => {
                const name = item.getAttribute('data-name').toLowerCase();
                item.style.display = name.includes(input) ? '' : 'none';
            });
        }
        function toggleTheme() {
            document.body.classList.toggle('light');
            const btn = document.querySelector('.theme-toggle');
            btn.textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
        }
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }
        function redeploy() {
            fetch('https://10.0.0.1:9443/api/stacks/webhooks/0e72e67f-34bc-42bb-a227-021ba8294ec1', {
                method: 'POST'
            }).then(() => {
                alert('Redeploy triggered!');
            }).catch(() => {
                alert('Redeploy triggered!');
            });
        }
    </script>
</body>
</html>
