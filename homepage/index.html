<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 20px; font-size: 16px; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #eee; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Apps</h1>
    <input type="text" id="search" placeholder="Search apps..." onkeyup="filterApps()">
    <ul id="appList">
        <li data-name="hockey-stats"><a href="http://10.0.0.1:1000">🏒 hockey-stats</a></li>
    </ul>
    <script>
        function filterApps() {
            const input = document.getElementById('search').value.toLowerCase();
            const items = document.querySelectorAll('#appList li');
            items.forEach(item => {
                const name = item.getAttribute('data-name').toLowerCase();
                item.style.display = name.includes(input) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
